<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Categories</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <header class="category-header">
<div class="back-icon" onclick="window.location.href='index.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
        </div>
        <div class="header-title">
            <h1>INVENTORY CATEGORIES</h1>
        </div>
        <div id="user-icon-header" class="user-icon" onclick="toggleProfileHeader()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
        </div>
        <div id="profile-menu-header" class="profile-menu">
            <div class="profile-item">
                <span>Admin User</span>
            </div>
            <div class="profile-item logout-menu" onclick="logoutInventory()">
                <span>Logout</span>
            </div>
        </div>
    </header>

    <main class="category-main">
        <div class="category-grid">
<div class="category-card equipments-card" onclick="window.location.href='equipment.html'">

                <div class="category-icon">
                    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#2d2d2d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        
                        <rect x="2" y="4" width="20" height="14" rx="2"/>
                        <circle cx="12" cy="18" r="3"/>
                        <line x1="12" y1="21" x2="12" y2="21"/>
                    </svg>
                </div>
                <div class="category-label">
                    <h2>EQUIPMENTS</h2>
                </div>
            </div>

<div class="category-card tools-card" onclick="window.location.href='tools.html'">

                <div class="category-icon">
                    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#2d2d2d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        
                        <circle cx="12" cy="12" r="9"/>
                        <path d="M19 14a5 5 0 0 0-5-5 5 5 0 0 0-5 5 5 5 0 0 0 5 5 5 5 0 0 0 5-5z"/>
                        <line x1="12" y1="10" x2="12" y2="10"/>
                        <path d="m14.5 15 1.5-1.5L13 12l-1.5 1.5"/>
                        <path d="m15 9-1.5 1.5L12 12l1.5-1.5"/>
                    </svg>
                </div>
                <div class="category-label">
                    <h2>TOOLS</h2>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleProfile() {
            const menu = document.getElementById('profile-menu-header');
            menu.classList.toggle('show');
        }


        function logoutInventory() {
            window.location.href = 'index.html';
            // Note: Full logout logic can be enhanced if needed
        }

        // Close menu when clicking outside
        document.addEventListener('click', function(event) {
            const profileIcon = document.getElementById('user-icon-header');
            const menu = document.getElementById('profile-menu-header');
            if (!profileIcon.contains(event.target) && !menu.contains(event.target)) {
                menu.classList.remove('show');
            }
        });
    </script>
</body>
</html>
