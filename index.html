<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratory Management </title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <nav id="main-nav" class="hidden">
        <ul>
        </ul>
        <div id="user-icon" class="user-icon" onclick="toggleProfile()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
        </div>
        <div id="profile-menu" class="profile-menu">
            <div class="profile-item">
                <span>Admin User</span>
            </div>
            <div class="profile-item logout-menu" onclick="logout()">
                <span>Logout</span>
            </div>
        </div>
    </nav>

    <section id="login-screen" class="screen active">
        <div class="login-card">
            <h2>Login</h2>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-password" placeholder="Password">
            <button id="login-btn" type="button" onclick="login()">Log In</button>
            <p class="demo-text">Demo: Email: admin, Password: password</p>
        </div>
    </section>

    <section id="home-screen" class="screen">
        <div class="dashboard">
            <div class="dashboard-grid">
<div class="card inventory-card" onclick="window.location.href='inventory.html'">
                    <h2>Inventory</h2>
                    <ul class="item-list">
                        <li>Steel Beams (150 units)</li>
                        <li>Concrete Mix (2 tons)</li>
                        <li>Hammer Drills (8 units)</li>
                        <li>Safety Helmets (45 units)</li>
                        <li>Ladders (12 units)</li>
                    </ul>
                </div>

                <div class="card reports-card">
                    <h2>Recent Reports</h2>
                    <ul class="item-list">
                        <li>Supply Restock</li>
                        <li>Equipment Maintenance - Due</li>
                        <li>Missing Tools</li>
                    </ul>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
