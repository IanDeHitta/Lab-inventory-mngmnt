<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Tool Item</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * { box-sizing: border-box; }

        .form-header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(to right, #e73523, #f3931f);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
        }

        .back-arrow { 
            cursor: pointer; 
            font-size: 24px; 
            color: white; 
            padding: 8px; 
            border-radius: 50%; 
            transition: background 0.3s ease; 
            max-width: 100%;
        }
        .back-arrow:hover { background: rgba(255,255,255,0.2); }

        .form-title { 
            position: absolute; 
            left: 50%; 
            transform: translateX(-50%); 
            color: white; 
            font-size: 1.5rem; 
            font-weight: 700; 
            text-transform: uppercase; 
        }

        .user-icon-form { 
            width: 48px; 
            height: 48px; 
            border-radius: 50%; 
            background: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            max-width: 100%;
        }

        .form-content { 
            background: #f5f5f5; 
            min-height: 100vh; 
            padding: 100px 20px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .form-container { 
            background: white; 
            border-radius: 20px; 
            padding: 40px; 
            width: 90%; 
            max-width: 800px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); 
        }

        .form-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-bottom: 32px; 
        }

        .form-group { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }

        .form-group label { 
            font-weight: 600; 
            color: #2d2d2d; 
            font-size: 1rem; 
        }

        .form-group input { 
            padding: 14px 16px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            background: white; 
            font-size: 1rem; 
            transition: border-color 0.3s; 
            max-width: 100%; 
            width: 100%; 
        }

        .form-group input:focus { 
            outline: none; 
            border-color: #f3931f; 
            box-shadow: 0 0 0 2px rgba(243,147,31,0.2);
        }

        .date-group { 
            display: flex; 
            gap: 8px; 
            flex-wrap: nowrap; 
            width: 100%; 
        }

        .date-group input { 
            flex: 1; 
            min-width: 0;
        }

        .save-btn { 
            background: linear-gradient(135deg, #ffc107, #ff9800); 
            color: white; 
            border: 1px solid black; 
            padding: 16px 40px; 
            border-radius: 25px; 
            font-size: 1.1rem; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: auto; 
            margin: 0 auto; 
            display: block;
        }

        .save-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 25px rgba(255,193,7,0.4); 
        }

        @media (max-width: 768px) { 
            .form-grid { grid-template-columns: 1fr; gap: 16px; } 
            .date-group { 
                flex-direction: column; 
            } 
            .form-container { width: 95%; padding: 24px; }
            .back-arrow { color: white; background: rgba(0,0,0,0.2); }
            .back-arrow:hover { background: rgba(0,0,0,0.4); }
        }
    </style>
</head>
<body>
    <header class="form-header">
        <div class="back-icon" onclick="window.location.href='tools.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
        </div>
        <div class="form-title">Add Tool Item</div>
        <div id="user-icon-addtool" class="user-icon user-icon-form">

            <svg width="24" height="24" fill="#2d2d2d" viewBox="0 0 24 24">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
        </div>
    </header>

    <main class="form-content">
        <form id="toolForm" class="form-container">
            <div class="form-grid">
                <!-- Left Column -->
                <div class="form-group">
                    <label for="itemName">Item Name</label>
                    <input type="text" id="itemName" name="itemName" required>
                </div>
                <div class="form-group">
                    <label for="brand">Brand</label>
                    <input type="text" id="brand" name="brand" required>
                </div>
                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" name="quantity" min="0" required>
                </div>
                <!-- Right Column -->
                <div class="form-group">
                    <label>Purchase Date</label>
                    <div class="date-group">
                        <input type="text" id="day" placeholder="DD" maxlength="2" pattern="\\d{2}">
                        <input type="text" id="month" placeholder="MM" maxlength="2" pattern="\\d{2}">
                        <input type="text" id="year" placeholder="YYYY" maxlength="4" pattern="\\d{4}">
                    </div>
                </div>
                <div class="form-group">
                    <label for="vendor">Vendor/Supplier</label>
                    <input type="text" id="vendor" name="vendor" required>
                </div>
            </div>
            <input type="hidden" id="editIndex" value="-1">
            <button type="submit" class="save-btn">Save Changes</button>
        </form>
    </main>

    <script>
        const form = document.getElementById('toolForm');
        const urlParams = new URLSearchParams(window.location.search);
        const editIndex = urlParams.get('edit');

        if (editIndex !== null) {
            const tools = JSON.parse(localStorage.getItem('tools') || '[]');
            const item = tools[parseInt(editIndex)];
            if (item) {
                document.getElementById('itemName').value = item.name || '';
                document.getElementById('brand').value = item.brand || '';
                document.getElementById('quantity').value = item.quantity || '';
                document.getElementById('vendor').value = item.vendor || '';
                const dateMatch = item.date.match(/(\\d{2})\\/(\\d{2})\\/(\\d{4})/);
                if (dateMatch) {
                    document.getElementById('day').value = dateMatch[1];
                    document.getElementById('month').value = dateMatch[2];
                    document.getElementById('year').value = dateMatch[3];
                }
                document.getElementById('editIndex').value = editIndex;
                document.querySelector('.form-title').textContent = 'Edit Tool Item';
            }
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const day = document.getElementById('day').value.padStart(2, '0');
            const month = document.getElementById('month').value.padStart(2, '0');
            const year = document.getElementById('year').value;
            const dateStr = day + '/' + month + '/' + year;

            const item = {
                name: document.getElementById('itemName').value,
                date: dateStr,
                brand: document.getElementById('brand').value,
                quantity: document.getElementById('quantity').value,
                vendor: document.getElementById('vendor').value
            };

            let tools = JSON.parse(localStorage.getItem('tools') || '[]');
            const index = parseInt(document.getElementById('editIndex').value);
            if (index >= 0) {
                tools[index] = item;
            } else {
                tools.unshift(item);
            }
            localStorage.setItem('tools', JSON.stringify(tools));

            alert('Tool item saved successfully!');
            setTimeout(() => {
                window.location.href = 'tools.html';
            }, 1000);
        });
    </script>
</body>
</html>
